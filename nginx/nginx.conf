events {
  worker_connections 1024;
}

http {
  # ── Upstream services ──────────────────────────────────────────────────────
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8787;
  }

  # ── WebSocket upgrade map ──────────────────────────────────────────────────
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ── Compression ────────────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml image/svg+xml text/javascript;
  gzip_min_length 1000;
  gzip_proxied any;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  # ── HTTP server (redirect to HTTPS once SSL is configured) ─────────────────
  server {
    listen 80;
    server_name _;

    # Uncomment after running certbot to redirect HTTP → HTTPS:
    # location /.well-known/acme-challenge/ {
    #   root /var/www/certbot;
    # }
    # location / {
    #   return 301 https://$host$request_uri;
    # }

    # ── Hono API — accessible at /api/v1/ ────────────────────────────────────
    location /api/v1/ {
      rewrite ^/api/v1/(.*)$ /$1 break;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Next.js app ───────────────────────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── HTTPS server (enable after getting SSL cert via certbot) ───────────────
  # server {
  #   listen 443 ssl;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/live/yourdomain.com/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/live/yourdomain.com/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
